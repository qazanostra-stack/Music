<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Track Display</title>
  <style>
    body {
      background: transparent;
      color: white;
      font-size: 24px;
      text-align: center;
    }
  </style>
  <script>
    async function loadTrack() {
      try {
        const response = await fetch("track.txt?" + new Date().getTime());
        const text = await response.text();
        document.getElementById("track").innerText = text;
      } catch (e) {
        document.getElementById("track").innerText = "Ошибка загрузки";
      }
    }
    setInterval(loadTrack, 5000); // обновление каждые 5 секунд
    window.onload = loadTrack;
  </script>
</head>
<body>
  <div id="track">Загрузка...</div>
</body>
</html>
